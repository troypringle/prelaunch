<script>
    // 1. URL PARAMETER LOGIC (Existing)
    (function() {
        var params = window.location.search;
        if (params) {
            var links = document.getElementsByTagName('a');
            for (var i = 0; i < links.length; i++) {
                if(links[i].href.indexOf('aimatrixspillover') !== -1) {

            }
        }
    })();

    // 2. IMAGE ROTATION + TRANSITION BOOST
    (function() {
        const profBox = document.getElementById('profBox');
        let count = 1;
        
        setInterval(() => {
            count = (count % 7) + 1;
            
            // Apply a quick scale effect to "boost" the transition
            profBox.style.transform += " scale(1.15)";
            
            setTimeout(() => {
                profBox.style.backgroundImage = `var(--prof-${count})`;
                // Reset scale after the image swaps
                profBox.style.transform = profBox.style.transform.replace(" scale(1.15)", "");
            }, 150); 

        }, 10000); 
    })();
</script>
<script>
(function() {
    function injectHbaTid() {
        const tidValue = new URLSearchParams(window.location.search).get('TID');
        if (!tidValue) return;

        // 1. Update any links that appear
        document.querySelectorAll('a[href*="thehba.app"]').forEach(link => {
            if (!link.href.includes('TID=')) {
                const sep = link.href.includes('?') ? '&' : '?';
                link.href = link.href + sep + 'TID=' + tidValue;
            }
        });

        // 2. Update any form actions that appear
        document.querySelectorAll('form[action*="thehba.app"]').forEach(form => {
            if (!form.action.includes('TID=')) {
                const sep = form.action.includes('?') ? '&' : '?';
                form.action = form.action + sep + 'TID=' + tidValue;
            }
        });
    }

    // This watches the React app and runs every time the page changes
    const observer = new MutationObserver(() => injectHbaTid());
    observer.observe(document.documentElement, { childList: true, subtree: true });
    
    // Also run once at start
    window.addEventListener('load', injectHbaTid);
})();
</script>
