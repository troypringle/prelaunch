<img src="/api/v1/t" style="display:none;" alt="" onerror="this.style.display='none'">

<script>
    // 1. LINK GUARD: Pass ?tr= values
    (function() {
        var params = window.location.search;
        if (params) {
            document.querySelectorAll('.track-link').forEach(function(l) {
                var sep = l.href.indexOf('?') !== -1 ? '&' : '?';
                l.href = l.href + params.replace('?', sep);
            });
        }
    })();

    // 2. COUNTDOWN TIMER LOGIC (24-Hour Cycle)
    function updateTimer() {
        const now = new Date();
        const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        const diff = tomorrow - now;

        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML = 
            (hours < 10 ? "0" + hours : hours) + ":" + 
            (minutes < 10 ? "0" + minutes : minutes) + ":" + 
            (seconds < 10 ? "0" + seconds : seconds);
    }
    setInterval(updateTimer, 1000);
    updateTimer();
</script>
