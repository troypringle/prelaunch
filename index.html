<!DOCTYPE html>
<html lang="en">
<head>
    <title>Official PRELAUNCH By Joel Therien My Sponsors Downline</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <style>
        * { box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            margin: 0; padding: 12px;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
        }

        /* OUTER PAGE BORDER - Faint and Dark */
        .page-border {
            width: 100%;
            max-width: 820px;
            border: 1px solid #222; 
            border-radius: 10px;
            padding: 12px;
            background: #050505;
            text-align: center;
        }

        /* SETTING: YELLOW TOP BANNER SIZE */
        .streak-container {
            display: inline-block;
            width: 100%;
            max-width: 650px; 
            height: 85px;      
            background: url('https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/f3511efd5936e0986b6fb7034cecc2c7.png') center / 100% 100% no-repeat;
            position: relative;
            margin-bottom: 10px;
        }

        /* SETTING: TOP TEXT SIZE (URGENCY LINE) */
        .streak-text {
            font-size: 22px; 
            color: #ff0000;
            font-weight: 900;
            text-transform: uppercase;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            margin: 0;
        }

        .banner-img {
            width: 100%;
            max-width: 780px;
            height: auto;
            border-radius: 4px;
            display: block;
            margin: 0 auto;
        }

        /* SETTING: SPACE BETWEEN BANNER AND WATCH NOW TEXT */
        .spacer-between {
            height: 25px; 
        }

        /* SETTING: WATCH HOW TEXT SIZE */
        .headline {
            font-size: 18px; 
            color: #00ff88;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: block;
        }
        .red-arrow { color: #ff0000; margin-right: 5px; }

        /* VIDEO AREA */
        .video-container-box {
            position: relative;
            width: 100%;
            max-width: 780px;
            margin: 0 auto 10px auto;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            border: 1px solid #00ff88;
            background: #000;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* EXIT BLOCKER */
        .touch-shield {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 50px;
            z-index: 10;
            background: rgba(0,0,0,0);
        }

        /* SETTING: TRANSPARENT BOTTOM CTA OVERLAY */
        .video-cta-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 52px;
            /* RGBA provides the transparency: 0.85 opacity */
            background: rgba(0, 255, 110, 0.85); 
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            box-shadow: 0 -5px 15px rgba(0, 255, 110, 0.2); /* Soft glow edge */
        }
        .video-cta-overlay a {
            color: #ff0000;
            font-size: 17px;
            font-weight: 900;
            text-decoration: none;
            width: 100%;
            text-shadow: 0 0 4px rgba(255, 0, 0, 0.3);
        }

        .yoda-quote {
            font-size: 10px;
            color: #333;
            margin-top: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="page-border">
    <div class="streak-container">
        <p class="streak-text">Time Sensitive New Updates</p>
    </div>

    <a href="https://troypringle2.aimatrixspillover.com/">
        <img src="https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/2635024737b92bb05b71e8c4a98a9751.png"
             class="banner-img" alt="Secure Your Spot">
    </a>

    <div class="spacer-between"></div>

    <span class="headline">
        <span class="red-arrow">➤</span> Watch How Eric Builds a Massive Downline
    </span>

    <div class="video-container-box">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1"
                    frameborder="0" allowfullscreen></iframe>
        </div>
        
        <div class="touch-shield"></div>

        <div class="video-cta-overlay">
            <a href="https://troypringle2.aimatrixspillover.com/" target="_blank">🔥 CLICK TO SECURE YOUR SPOT 🔥</a>
        </div>
    </div>

    <div class="yoda-quote">"do or do not there is no try" - yoda</div>
</div>

<script>
    (function() {
        var params = window.location.search;
        if (params) {
            var links = document.getElementsByTagName('a');
            for (var i = 0; i < links.length; i++) {
                if(links[i].href.indexOf('aimatrixspillover') !== -1) {
                    var sep = links[i].href.indexOf('?') !== -1 ? '&' : '?';
                    links[i].href += sep + params.substring(1);
                }
            }
        }
    })();
</script>

</body>
</html>
