<!DOCTYPE html>

    <link href="https://linkpod.s3.us-east-1.amazonaws.com/assets/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* DARK GREEN CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #004d26; border-radius: 5px; border: 1px solid #00ff88; }
        ::-webkit-scrollbar-thumb:hover { background: #007038; }

        /* BASE RESET */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Karla', sans-serif; 
            background: #000; 
            color: white; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container-main { max-width: 800px; margin: 0 auto; padding: 15px; text-align: center; position: relative; }

        /* HEADLINE */
        .headline { 
            font-size: clamp(1.3rem, 5vw, 2.5rem); 
            color: #00ff88; font-weight: 900; text-transform: uppercase; 
            margin: 19px 0; line-height: 1.1; 
        }
        .red-arrow { color: #ff0000; margin-right: 8px; }
        .live-dot { 
            height: 24px; width: 24px; background: #ff0000; border-radius: 50%; 
            display: inline-block; margin-left: 13px; vertical-align: middle;
            box-shadow: 0 0 13px #ff0000; animation: blink 0.6s infinite;
        }

        /* TIMER BOX - Cleaned up background bleed */
        .timer-box { 
            background: transparent; 
            border: 1.5px solid #00ff88; 
            border-radius: 15px; padding: 20px; margin-bottom: 20px;
            animation: loadZoom 0.9s ease-in-out 6;
        }
        
        /* YELLOW STREAK - Text back to RED */
        .streak-container {
            display: inline-block;
            background: linear-gradient(110deg, transparent 5%, #ffea00 15%, #ffea00 85%, transparent 95%);
            padding: 5px 25px;
            margin-bottom: 15px;
            border-radius: 3px;
        }
        .timer-label { 
            font-size: clamp(1.1rem, 5vw, 1.6rem); 
            color: #ff0000; /* Back to Red */
            font-weight: 900; 
            text-transform: uppercase;
            text-shadow: 1px 1px 0px #fff; /* Makes red pop on yellow */
        }

        #countdown { font-size: clamp(2.5rem, 12vw, 4rem); color: #00ff88; font-family: monospace; font-weight: 900; }
        
        /* VIDEO WRAPPER */
        .video-wrapper {
            position: relative; width: 100%; padding-bottom: 56.25%;
            height: 0; border: 1px solid #00ff88; border-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); background: #000; margin-bottom: 10px;
            overflow: hidden;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 4px; }

        /* EXIT GUARDS */
        .exit-guard-top { position: absolute; top: 0; left: 0; width: 100%; height: 75px; z-index: 100; }
        .exit-guard-side { position: absolute; top: 75px; bottom: 50px; width: 25%; z-index: 100; }

        .video-cta-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; height: 50px; 
            background: linear-gradient(to top, rgba(0, 255, 110, 0.6), transparent); 
            display: flex; align-items: center; justify-content: center; z-index: 110;
        }
        .video-cta-overlay a {
            color: white; font-size: clamp(14px, 4vw, 18px); font-weight: bold; 
            text-decoration: none; text-shadow: 2px 2px 4px #000; width: 100%;
        }

        /* YODA TEXT - Darker/Subtle below video */
        .yoda-quote {
            font-size: 1.2rem;
            color: #555; /* Darker gray */
            font-style: italic;
            margin: 15px 0 25px 0;
            letter-spacing: 0.5px;
        }

        /* BANNER */
        .banner-link { display: block; text-decoration: none; margin-top: 10px; }
        .banner-img { 
            width: 100%; height: auto; border-radius: 4px; 
            box-shadow: 6px 6px 15px rgba(255, 0, 0, 0.5), -2px -2px 10px rgba(0, 255, 136, 0.3);
        }

        /* TRAFFIC ADBAR - SCROLLING (NOT ANCHORED) */
        .adbar-holder { 
            margin-top: 50px;
            display: flex;
            justify-content: flex-start;
            padding-left: 10px;
            width: 100%;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes loadZoom { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    </style>
</head>
<body>

<div class="container-main">
    <h1 class="headline"><span class="red-arrow">➤</span>Watch How Eric Built a Massive Downline <span class="live-dot"></span></h1>

        <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1&enablejsapi=1" 
                frameborder="0" allowfullscreen></iframe>
        
        <div class="video-cta-overlay">

             class="banner-img" alt="Secure Your Spot">
    </a>

    <div class="adbar-holder">
        <div id="tab-container">
            <script type="text/javascript">
                tc_ad_client="pringle1troy"; tc_ad_width="252"; tc_ad_height="90";
                tc_color_border="#000000"; tc_color_title="#004d26"; tc_color_background="#000000"; 
                tc_color_text="#004d26"; tc_color_url="#002211";

            <script type="text/javascript" src="https://trafficadbar.com/bar/show.js"></script>

    </div>
</div>

<script>
    (function() {
        var params = window.location.search;
        if (params) {
            document.querySelectorAll('a').forEach(function(link) {
                if(link.href.includes('aimatrixspillover')) {
                    var sep = link.href.indexOf('?') !== -1 ? '&' : '?';
                    link.href = link.href + params.replace('?', sep);
                }
            });
        }
    })();

    function startTimer() {
        setInterval(() => {
            const now = new Date();
            const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            const diff = tomorrow - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById("countdown").innerText = 
                `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }
    startTimer();
</script>
