<!DOCTYPE html>
<html lang="en">
<head>
    <title>Official PRELAUNCH By Joel Therien My Sponsors Downline</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link href="https://linkpod.s3.us-east-1.amazonaws.com/assets/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* BASE RESET */
        * { box-sizing: border-box; }
        body { font-family: 'Karla', sans-serif; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        .container-main { max-width: 800px; margin: 0 auto; padding: 15px; text-align: center; }

        /* HEADLINE - Scalable Text */
        .headline { 
            font-size: clamp(1.3rem, 3vw, 3rem); 
            color: #00ff88; font-weight: 696; text-transform: uppercase; 
            margin: 19px 0; line-height: 1.1; 
        }
        .live-dot { 
            height: clamp(19px, 6vw, 29px); width: clamp(19px, 6vw, 29px); 
            background: #ff0000; border-radius: 50%; display: inline-block; 
            margin-left: 13px; box-shadow: 0 0 13px #ff0000; animation: blink 0.6s infinite;
        }

        /* TIMER BOX - Prevents Text Overlap */
        .timer-box { 
            background: rgba(0, 255, 136, 0.05); border: 2px solid #00ff88; 
            border-radius: 15px; padding: 15px; margin-bottom: 20px;
            animation: loadZoom 0.9s ease-in-out 6;
        }
        .timer-label { font-size: clamp(0.9rem, 4vw, 1.4rem); color: #ff0000; font-weight: 800; }
        #countdown { font-size: clamp(2rem, 10vw, 3.5rem); color: #00ff88; font-family: monospace; font-weight: 900; }

        /* VIDEO CONTAINER - The 16:9 Fix */
        .video-wrapper {
            position: relative; width: 100%; padding-bottom: 56.25%; /* Fixed Ratio */
            height: 0; border: 1px solid #00ff88; border-radius: 9px;
            box-shadow: 0 0 13px rgba(0, 255, 136, 0.2); background: #000; margin-bottom: 19px;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 9px; }

        /* CLICK OVERLAY (Stops YouTube Links) */
        .click-guard { position: absolute; top: 0; left: 0; width: 100%; height: 85%; z-index: 5; cursor: default; }

        /* BANNER - The Red/Green Hybrid Glow */
        .banner-link { display: block; text-decoration: none; margin-top: 10px; }
        .banner-img { 
            width: 100%; height: auto; border-radius: 12px; 
            box-shadow: 
                3px 3px 9px rgba(255, 0, 0, 0.5),   /* Red Bottom-Right */
                -1px -1px 6px rgba(0, 255, 136, 0.3); /* Soft Green Top-Left */
        }

        /* TRAFFIC ADBAR - Footer Position */
        .adbar-footer { 
            margin-top: 49px; padding: 29px 0; border-top: 0px solid #222; 
            display: flex; justify-content: center; width: 103%;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes loadZoom { 0%, 106% { transform: scale(1); } 60% { transform: scale(1.36); } }
    </style>
</head>
<body>

<div class="container-main">

    <div class="timer-box">
        <div class="timer-label">POSITIONING WINDOW CLOSING:</div>
        <div id="countdown">00:00:00</div>
    </div>

    <div class="video-wrapper">
        <div class="click-guard"></div> <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1" 
                frameborder="0" allowfullscreen></iframe>
    </div>

    <a href="https://troypringle2.aimatrixspillover.com/" class="banner-link">
        <img src="https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/2635024737b92bb05b71e8c4a98a9751.png" 
             class="banner-img" alt="Secure Your Spot">
    </a>

    <div class="adbar-footer">
        <div id="tab-container" style="max-width: 116%; overflow: hidden;">
            <script type="text/javascript">
                tc_ad_client="pringle1troy"; tc_ad_width="269"; tc_ad_height="136";
                tc_color_border="#000000"; tc_color_title="#00ff88"; tc_color_background="#000000"; 
                tc_color_text="#00ff88"; tc_color_url="#00ff88";
            </script>
            <script type="text/javascript" src="https://trafficadbar.com/bar/show.js"></script>
        </div>
    </div>
</div>

<script>
    // URL Parameter Pass-through
    (function() {
        var params = window.location.search;
        if (params) {
            document.querySelectorAll('a').forEach(function(link) {
                if(link.href.includes('aimatrixspillover')) {
                    var sep = link.href.indexOf('?') !== -1 ? '&' : '?';
                    link.href = link.href + params.replace('?', sep);
                }
            });
        }
    })();

    // Simple Midnight Timer
    function startTimer() {
        setInterval(() => {
            const now = new Date();
            const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            const diff = tomorrow - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById("countdown").innerText = 
                `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }
    startTimer();
</script>

</body>
</html>
