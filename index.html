<!DOCTYPE html>
<html lang="en">
<head>
    <title>Official PRELAUNCH By Joel Therien My Sponsors Downline</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <style>
        /* INTERNAL STYLING ONLY - NO EXTERNAL CALLS */
        * { box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            margin: 0; padding: 10px; /* Space for the page border */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
        }

        /* THE MAIN PAGE CONTAINER / BORDER */
        .page-border {
            width: 100%;
            max-width: 820px;
            border: 2px solid #00ff88; /* Matching green border */
            border-radius: 8px;
            padding: 10px;
            background: #050505;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); /* Subtle glow */
            text-align: center;
        }

        /* YELLOW BRUSH STREAK */
        .streak-container {
            display: inline-block;
            width: 100%;
            max-width: 600px;
            height: 65px; 
            background: url('https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/f3511efd5936e0986b6fb7034cecc2c7.png') center / 100% 100% no-repeat;
            position: relative;
            margin-bottom: 8px;
        }
        .streak-text {
            font-size: 18px;
            color: #ff0000;
            font-weight: 900;
            text-transform: uppercase;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            margin: 0;
        }

        /* BANNER */
        .banner-img {
            width: 100%;
            max-width: 780px;
            height: auto;
            border-radius: 4px;
            margin-bottom: 8px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* MLM SUB-HEADLINE */
        .headline {
            font-size: 13px; /* Smaller, fixed size */
            color: #00ff88;
            font-weight: 700;
            text-transform: uppercase;
            margin: 5px 0 12px 0;
            display: block;
            letter-spacing: 0.5px;
        }
        .red-arrow { color: #ff0000; margin-right: 3px; }

        /* VIDEO AREA */
        .video-container-box {
            position: relative;
            width: 100%;
            max-width: 780px;
            margin: 0 auto 10px auto;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            border: 1px solid #00ff88;
            background: #000;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* 1. EXIT BLOCKER (Touch Shield) */
        .touch-shield {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 50px;
            z-index: 10;
            background: rgba(0,0,0,0);
        }

        /* 2. BOTTOM CTA OVERLAY */
        .video-cta-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 48px;
            background: #00ff6e; 
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .video-cta-overlay a {
            color: #ff0000;
            font-size: 16px;
            font-weight: 900;
            text-decoration: none;
            width: 100%;
        }

        .yoda-quote {
            font-size: 10px;
            color: #333;
            margin-top: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="page-border">
    <div class="streak-container">
        <p class="streak-text">Time Sensitive New Updates</p>
    </div>

    <a href="https://troypringle2.aimatrixspillover.com/">
        <img src="https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/2635024737b92bb05b71e8c4a98a9751.png"
             class="banner-img" alt="Secure Your Spot">
    </a>

    <span class="headline">
        <span class="red-arrow">➤</span> Watch How Eric Builds a Massive Downline
    </span>

    <div class="video-container-box">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1"
                    frameborder="0" allowfullscreen></iframe>
        </div>
        
        <div class="touch-shield"></div>

        <div class="video-cta-overlay">
            <a href="https://troypringle2.aimatrixspillover.com/" target="_blank">🔥 CLICK TO SECURE YOUR SPOT 🔥</a>
        </div>
    </div>

    <div class="yoda-quote">"do or do not there is no try" - yoda</div>
</div>

<script>
    // URL Parameter Passing Script
    (function() {
        var params = window.location.search;
        if (params) {
            var links = document.getElementsByTagName('a');
            for (var i = 0; i < links.length; i++) {
                if(links[i].href.indexOf('aimatrixspillover') !== -1) {
                    var sep = links[i].href.indexOf('?') !== -1 ? '&' : '?';
                    links[i].href += sep + params.substring(1);
                }
            }
        }
    })();
</script>

</body>
</html>
