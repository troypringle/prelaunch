<script>
    // 1. URL PARAMETER LOGIC (Existing)
    (function() {
        var params = window.location.search;
        if (params) {
            var links = document.getElementsByTagName('a');
            for (var i = 0; i < links.length; i++) {
                if(links[i].href.indexOf('aimatrixspillover') !== -1) {
                    var sep = links[i].href.indexOf('?') !== -1 ? '&' : '?';
                    links[i].href += sep + params.substring(1);
                }
            }
        }
    })();

    // 2. IMAGE ROTATION + TRANSITION BOOST
    (function() {
        const profBox = document.getElementById('profBox');
        let count = 1;
        
        setInterval(() => {
            count = (count % 7) + 1;
            
            // Apply a quick scale effect to "boost" the transition
            profBox.style.transform += " scale(1.15)";
            
            setTimeout(() => {
                profBox.style.backgroundImage = `var(--prof-${count})`;
                // Reset scale after the image swaps
                profBox.style.transform = profBox.style.transform.replace(" scale(1.15)", "");
            }, 150); 

        }, 10000); 
    })();
</script>
