    <style>

            border-radius: 60px 25px 55px 30px; 
            padding: 12px 35px;
            margin-bottom: 12px;
        }
        .timer-label { 
            font-size: clamp(1.1rem, 5vw, 1.8rem); 
            color: #ff0000; font-weight: 900; 
            text-transform: uppercase;
        }

        /* NARROW TIMER BOX - Minimal Border */
        .timer-box { 
            background: transparent; 
            border: 1px solid #111; /* Almost invisible dark border */
            max-width: 400px; /* Narrower for mobile focus */
            margin: 0 auto 20px auto;
            padding: 15px 10px;
        }
        #countdown { font-size: clamp(2.5rem, 12vw, 4rem); color: #00ff88; font-family: monospace; font-weight: 900; }
        
        /* VIDEO WRAPPER */
        .video-wrapper {
            position: relative; width: 100%; padding-bottom: 56.25%;
            height: 0; border: 1.5px solid #00ff88; border-radius: 6px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); background: #000; margin-bottom: 10px;

        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* BANNER - No Glow */

        /* TRAFFIC ADBAR - Visibility Tweak */

            padding: 10px;
            display: flex;

<script>
    (function() {
        var params = window.location.search;
        if (params) {
            document.querySelectorAll('a').forEach(function(link) {
                if(link.href.includes('aimatrixspillover')) {
                    var sep = link.href.indexOf('?') !== -1 ? '&' : '?';
                    link.href = link.href + params.replace('?', sep);
                }
            });
        }
    })();

    function startTimer() {
        setInterval(() => {
            const now = new Date();
            const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            const diff = tomorrow - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById("countdown").innerText = 
                `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }
    startTimer();
</script>
