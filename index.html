<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRELAUNCH ACCESS | AiMatrix</title>
    <style>
        :root { --neon: #00ff88; --dark: #0a0a0a; }
        body { background-color: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        /* Premium Container */
        .funnel-container { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 255, 136, 0.2); backdrop-filter: blur(10px); padding: 40px 20px; border-radius: 20px; text-align: center; max-width: 650px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .header-tag { color: var(--neon); text-transform: uppercase; letter-spacing: 2px; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        h1 { font-size: 28px; margin: 0 0 20px 0; line-height: 1.2; }
        
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; border: 1px solid #333; margin-bottom: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.4); }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .btn { background: linear-gradient(90deg, #00ff88, #00bd65); color: #000; text-decoration: none; font-weight: 800; font-size: 20px; padding: 20px; border-radius: 12px; display: block; transition: 0.3s; text-transform: uppercase; animation: pulse 2s infinite; }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(0, 255, 136, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } }
        
        .footer-note { margin-top: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>

    <div class="funnel-container">
        <div class="header-tag">Official System Launch</div>
        <h1>Secure Your Matrix Position</h1>
        
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?start=216&rel=0&autoplay=0" frameborder="0" allowfullscreen></iframe>
        </div>

        <a id="dynamic-link" href="https://troypringle2.aimatrixspillover.com/" class="btn">
            Lock In Your Spot Now
        </a>
        
        <p class="footer-note">DO NOT REFRESH THIS PAGE. YOUR POSITION IS RESERVED FOR 10 MINUTES.</p>
    </div>

    <script>
        (function() {
            var params = window.location.search;
            if (params) {
                var link = document.getElementById('dynamic-link');
                var sep = link.href.indexOf('?') !== -1 ? '&' : '?';
                link.href = link.href + params.replace('?', sep);
            }
        })();
    </script>
</body>
</html>
