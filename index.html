<!DOCTYPE html>
<html lang="en">
<head>
    <title>Official PRELAUNCH By Joel Therien My Sponsors Downline</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Karla', sans-serif;
            background: #000;
            color: white;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }
        
        .container-main {
            max-width: 820px;
            margin: 0 auto;
            padding: 2px 8px 25px 8px; /* Even tighter for mobile */
            text-align: center;
        }

        /* 1. Yellow Urgency */
        .streak-container {
            display: inline-block;
            width: 100%;
            max-width: 830px;
            height: clamp(50px, 10vw, 95px); 
            background: url('https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/f3511efd5936e0986b6fb7034cecc2c7.png') center / cover no-repeat;
            position: relative;
            margin-top: 5px;
            margin-bottom: 4px; 
        }
        .streak-text {
            font-size: clamp(1rem, 4.5vw, 1.8rem); 
            color: #ff0000;
            font-weight: 900;
            text-transform: uppercase;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
        }

        /* 2. Banner */
        .banner-img {
            width: 100%;
            max-width: 800px;
            height: auto;
            border-radius: 4px;
            margin-bottom: 6px; 
            display: block;
            margin-left: auto; margin-right: auto;
        }

        /* 3. SHRUNK SUB-HEADLINE (MLM Text) */
        .headline {
            font-size: clamp(0.85rem, 3.8vw, 1.4rem); /* Forced smaller */
            color: #00ff88;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            line-height: 1.1; /* Tighter line height */
        }
        .red-arrow { color: #ff0000; margin-right: 2px; }

        /* 4. Video Area - Fixed for Giant Buttons */
        .video-container-box {
            position: relative;
            width: 100%;
            margin-bottom: 10px;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            border: 1px solid #00ff88;
            border-radius: 4px;
            background: #000;
            overflow: hidden;
            z-index: 1;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* Invisible Shield */
        .touch-shield {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 42px; 
            z-index: 10;
            background: rgba(0,0,0,0.01); 
        }

        /* Secure Spot Button - Slightly Smaller */
        .video-cta-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: clamp(38px, 6.5vw, 50px); 
            background: linear-gradient(to top, rgba(0, 255, 110, 0.95), rgba(0,0,0,0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .video-cta-overlay a {
            color: #ff0000;
            font-size: clamp(12px, 4vw, 17px); /* Shrunk slightly */
            font-weight: 900;
            text-decoration: none;
            width: 100%;
            text-shadow: 0 0 2px #ff0000;
        }

        .yoda-quote {
            font-size: clamp(0.5rem, 2.2vw, 0.9rem);
            color: #222; /* Darker to blend in */
            margin-top: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container-main">
    <div class="streak-container">
        <div class="streak-text">Time Sensitive New Updates</div>
    </div>

    <a href="https://troypringle2.aimatrixspillover.com/">
        <img src="https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/2635024737b92bb05b71e8c4a98a9751.png"
             class="banner-img" alt="Secure Your Spot">
    </a>

    <h1 class="headline">
        <span class="red-arrow">➤</span> Watch How Eric Builds a Massive Downline
    </h1>

    <div class="video-container-box">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1&enablejsapi=1"
                    frameborder="0" allowfullscreen></iframe>
        </div>
        
        <div class="touch-shield"></div>

        <div class="video-cta-overlay">
            <a href="https://troypringle2.aimatrixspillover.com/" target="_blank">🔥 CLICK TO SECURE YOUR SPOT 🔥</a>
        </div>
    </div>

    <div class="yoda-quote">"do or do not there is no try" - yoda</div>
</div>

<script>
    (function() {
        var params = window.location.search;
        if (params) {
            document.querySelectorAll('a').forEach(function(link) {
                if(link.href.includes('aimatrixspillover')) {
                    var sep = link.href.indexOf('?') !== -1 ? '&' : '?';
                    link.href = link.href + params.replace('?', sep);
                }
            });
        }
    })();
</script>

</body>
</html>
