<!DOCTYPE html>
<html lang="en">
<head>
    <title>Official PRELAUNCH By Joel Therien My Sponsors Downline</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Karla', sans-serif;
            background: #000;
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .container-main {
            max-width: 820px;
            margin: 0 auto;
            padding: 10px 15px 40px 15px; /* Less top padding for the banner */
            text-align: center;
        }
        
        /* TOP BANNER */
        .banner-img {
            width: 100%;
            max-width: 800px;
            height: auto;
            border-radius: 4px;
            margin-bottom: 25px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* HEADLINE */
        .headline {
            font-size: clamp(1.45rem, 6.5vw, 2.7rem);
            color: #00ff88;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 18px;
            line-height: 1.05;
            text-shadow: 0 0 5px #00ff88, 0 0 8px rgba(0, 255, 136, 0.25);
        }
        .red-arrow { color: #ff0000; }

        /* YELLOW BRUSH STREAK */
        .streak-container {
            display: inline-block;
            width: 100%;
            max-width: 830px;
            height: 120px;
            background: url('https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/f3511efd5936e0986b6fb7034cecc2c7.png') center / 116% auto no-repeat;
            position: relative;
            margin-bottom: 26px;
            border-radius: 3px;
            overflow: hidden;
        }
        .streak-text {
            font-size: clamp(1.3rem, 6vw, 2.3rem);
            color: #ff0000;
            font-weight: 900;
            text-transform: uppercase;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            margin: 0;
            padding: 0 20px;
            line-height: 1.1;
            text-shadow: 0 0 4px #ff3333;
        }

        /* VIDEO WRAPPER */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            border: 1.5px solid #00ff88;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            background: #000;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* CLICK TO SECURE */
        .video-cta-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 62px;
            background: linear-gradient(to top, rgba(0, 255, 110, 0.7), transparent);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 110;
        }
        .video-cta-overlay a {
            color: #ff0000;
            font-size: clamp(16px, 5vw, 21px);
            font-weight: bold;
            text-decoration: none;
            width: 100%;
            padding: 0 15px;
            text-shadow: 0 0 6px #ff0000;
        }

        /* YODA TEXT */
        .yoda-quote {
            font-size: clamp(0.63rem, 3.1vw, 1.30rem);
            color: #555;
            font-style: italic;
            margin: 20px 0 10px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container-main">
    <a href="https://troypringle2.aimatrixspillover.com/">
        <img src="https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/2635024737b92bb05b71e8c4a98a9751.png"
             class="banner-img" alt="Secure Your Spot">
    </a>

    <h1 class="headline">
        <span class="red-arrow">➤</span> Watch How Eric Builds a Massive Downline
    </h1>

    <div class="streak-container">
        <div class="streak-text">Time Sensitive New Updates</div>
    </div>

    <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1"
                frameborder="0" allowfullscreen></iframe>
        <div class="video-cta-overlay">
            <a href="https://troypringle2.aimatrixspillover.com/" target="_blank">🔥 CLICK TO SECURE YOUR SPOT 🔥</a>
        </div>
    </div>

    <div class="yoda-quote">"do or do not there is no try" - yoda</div>
</div>

<script>
    // URL Parameter Passing Script
    (function() {
        var params = window.location.search;
        if (params) {
            document.querySelectorAll('a').forEach(function(link) {
                if(link.href.includes('aimatrixspillover')) {
                    var sep = link.href.indexOf('?') !== -1 ? '&' : '?';
                    link.href = link.href + params.replace('?', sep);
                }
            });
        }
    })();
</script>

</body>
</html>
