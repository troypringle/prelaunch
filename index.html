    <link href="https://linkpod.s3.us-east-1.amazonaws.com/assets/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* BASE RESET */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Karla', sans-serif; 
            background: #000; 
            color: white; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        /* BACKGROUND PROFESSOR */
        .bg-professor {
            position: fixed; top: 50%; right: -5%; width: 40%; max-width: 400px;
            opacity: 0.5; z-index: -1; transform: translateY(-50%); pointer-events: none;
        }

        .container-main { max-width: 800px; margin: 0 auto; padding: 15px; text-align: center; position: relative; }

        /* HEADLINE */
        .headline { 
            font-size: clamp(1.3rem, 5vw, 2.5rem); 
            color: #00ff88; font-weight: 900; text-transform: uppercase; 
            margin: 19px 0; line-height: 1.1; 
        }
        .red-arrow { color: #ff0000; margin-right: 8px; }
        .live-dot { 
            height: 24px; width: 24px; background: #ff0000; border-radius: 50%; 
            display: inline-block; margin-left: 13px; vertical-align: middle;
            box-shadow: 0 0 13px #ff0000; animation: blink 0.6s infinite;
        }

        /* TIMER BOX - Toned down green background */
        .timer-box { 
            background: rgba(0, 0, 0, 0.9); /* Mostly Black */
            border: 1.5px solid #00ff88; 
            border-radius: 15px; padding: 15px; margin-bottom: 5px;
            animation: loadZoom 0.9s ease-in-out 6;
        }
        .timer-label { font-size: clamp(0.9rem, 4vw, 1.4rem); color: #ff0000; font-weight: 800; }
        .side-arrow { color: #ff0000; padding: 0 10px; font-size: 1.2rem; }
        #countdown { font-size: clamp(2rem, 10vw, 3.5rem); color: #00ff88; font-family: monospace; font-weight: 900; }
        
        /* YODA TEXT */
        .yoda-quote {
            font-size: 0.85rem;
            color: #888;
            font-style: italic;
            margin-bottom: 20px;
            text-transform: lowercase;
            letter-spacing: 1px;
        }

        /* VIDEO WRAPPER */
        .video-wrapper {
            position: relative; width: 100%; padding-bottom: 56.25%;
            height: 0; border: 0.5px solid #00ff88; border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.15); background: #000; margin-bottom: 19px;
            overflow: hidden;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 4px; }

        .video-cta-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; height: 50px; 
            background: linear-gradient(to top, rgba(0, 255, 110, 0.2), transparent); 
            display: flex; align-items: center; justify-content: center; z-index: 20;
        }
        .video-cta-overlay a {
            color: white; font-size: clamp(14px, 4vw, 18px); font-weight: bold; 
            text-decoration: none; text-shadow: 2px 2px 4px #000; width: 100%;
        }

        /* BANNER */
        .banner-link { display: block; text-decoration: none; margin-top: 10px; }
        .banner-img { 
            width: 100%; height: auto; border-radius: 4px; 
            box-shadow: 3px 3px 6px rgba(255, 0, 0, 0.4), -2px -2px 9px rgba(0, 255, 136, 0.2);
        }

        /* TRAFFIC ADBAR */
        .adbar-footer { 
            position: fixed; bottom: 10px; left: 10px; z-index: 100;
            width: 252px; border-top: none;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes loadZoom { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @media (max-width: 1000px) { .bg-professor { display: none; } }
    </style>
</head>
<body>

    <div class="yoda-quote">"do or do not there is no try" - yoda</div>

    <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1&enablejsapi=1"

    <a href="https://troypringle2.aimatrixspillover.com/" class="banner-link">

             class="banner-img" alt="Secure Your Spot">
    </a>
</div>

<div class="adbar-footer">
    <div id="tab-container">
        <script type="text/javascript">
            tc_ad_client="pringle1troy"; tc_ad_width="252"; tc_ad_height="90";
            tc_color_border="#000000"; tc_color_title="#00ff88"; tc_color_background="#000000";

<script>
    (function() {
        var params = window.location.search;
        if (params) {
            document.querySelectorAll('a').forEach(function(link) {
                if(link.href.includes('aimatrixspillover')) {
                    var sep = link.href.indexOf('?') !== -1 ? '&' : '?';
                    link.href = link.href + params.replace('?', sep);
                }
            });
        }
    })();

    function startTimer() {
        setInterval(() => {
            const now = new Date();
            const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            const diff = tomorrow - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById("countdown").innerText = 
                `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }
    startTimer();
</script>
