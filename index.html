<!DOCTYPE html>

<head>

    <link href="https://linkpod.s3.us-east-1.amazonaws.com/assets/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* BASE RESET */
        * { box-sizing: border-box; }
        body { font-family: 'Karla', sans-serif; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        .container-main { max-width: 800px; margin: 0 auto; padding: 15px; text-align: center; }

        /* HEADLINE */
        .headline { 
            font-size: clamp(1.3rem, 5vw, 2.5rem); 
            color: #00ff88; font-weight: 900; text-transform: uppercase; 
            margin: 19px 0; line-height: 0.9; 
        }
        .live-dot { 
            height: 24px; width: 24px; background: #ff0000; border-radius: 50%; 
            display: inline-block; margin-left: 13px; vertical-align: middle;
            box-shadow: 0 0 13px #ff0000; animation: blink 0.6s infinite;
        }

        /* TIMER BOX - 6 Zoom Effect */
        .timer-box { 
            background: rgba(0, 255, 136, 0.05); border: 2px solid #00ff88; 
            border-radius: 15px; padding: 15px; margin-bottom: 20px;
            animation: loadZoom 0.9s ease-in-out 6;
        }
        .timer-label { font-size: clamp(0.9rem, 4vw, 1.4rem); color: #ff0000; font-weight: 800; }
        #countdown { font-size: clamp(2rem, 10vw, 3.5rem); color: #00ff88; font-family: monospace; font-weight: 900; }

        /* VIDEO WRAPPER WITH GLOW & EXITS */
        .video-wrapper {
            position: relative; width: 100%; padding-bottom: 56.25%;
            height: 0; border: 0.9px solid #00ff88; border-radius: 3px;
            box-shadow: 0 0 13px rgba(0, 255, 136, 0.2); background: #000; margin-bottom: 19px;
            overflow: hidden;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 9px; }

        /* CLICK GUARDS (RESTORED) */
        .exit-guard-top { position: absolute; top: 0; left: 0; width: 100%; height: 60px; z-index: 10; }
        .exit-guard-side { position: absolute; top: 60px; bottom: 50px; width: 20%; z-index: 10; }
        .left-guard { left: 0; }
        .right-guard { right: 0; }

        /* GREEN GLASS BUTTON (RESTORED & RESPONSIVE) */
        .video-cta-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; height: 50px; 
            background: linear-gradient(to top, rgba(0, 255, 110, 0.6), transparent); 
            display: flex; align-items: center; justify-content: center; z-index: 20;
            backdrop-filter: blur(2px);
        }
        .video-cta-overlay a {
            color: white; font-size: clamp(14px, 4vw, 18px); font-weight: bold; 
            text-decoration: none; text-shadow: 2px 2px 4px #000; width: 100%;
        }

        /* BANNER - Red Bottom-Right / Green Top-Left Glow */
        .banner-link { display: block; text-decoration: none; margin-top: 10px; }
        .banner-img { 
            width: 100%; height: auto; border-radius: .9px; 
            box-shadow: 
                3px 3px 6px rgba(255, 0, 0, 0.5), 
                -2px -2px 9px rgba(0, 255, 136, 0.3);
        }

        /* TRAFFIC ADBAR FIX */
        .adbar-footer { 
            margin-top: 40px; padding: 20px 0; border-top: 1px solid #222; 
            display: flex; justify-content: center; width: 100%;
        }
        #tab-container { max-width: 100%; overflow: hidden; }

        /* ANIMATIONS */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes loadZoom { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.05); } /* Toned down scale for mobile safety */
        }
    </style>
</head>
<body>

        <div class="exit-guard-side right-guard"></div>

        <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1&enablejsapi=1"

    <div class="adbar-footer">
        <div id="tab-container">
            <script type="text/javascript">

            </script>
            <script type="text/javascript" src="https://trafficadbar.com/bar/show.js"></script>

    </div>
</div>

<script>
    // URL Parameter Pass-through
    (function() {
        var params = window.location.search;
        if (params) {
            document.querySelectorAll('a').forEach(function(link) {
                if(link.href.includes('aimatrixspillover')) {
                    var sep = link.href.indexOf('?') !== -1 ? '&' : '?';
                    link.href = link.href + params.replace('?', sep);
                }
            });
        }
    })();

    // Simple Midnight Timer
    function startTimer() {
        setInterval(() => {
            const now = new Date();
            const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            const diff = tomorrow - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById("countdown").innerText = 
                `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }
    startTimer();
</script>
