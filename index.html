<!DOCTYPE html>
<html lang="en">
<head>
    <title>OFFICIAL PRELAUNCH - AiMatrix</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://linkpod.s3.us-east-1.amazonaws.com/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Karla&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: Karla, sans-serif !important; background: #000000; color: white; margin: 0; padding: 15px; }
        .wrapper { max-width: 850px; margin: auto; text-align: center; }
        h1 { font-size: 1.8rem; font-weight: bold; color: #fff; margin-bottom: 10px; }
        h2 { font-size: 1.1rem; color: #ccc; margin-bottom: 25px; }
        
        .video-box {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; 
            height: 0;
            border: 3px solid #00ff88;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
            background: #000;
            overflow: hidden;
            margin-bottom: 30px;
        }
        .video-box iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* TOP GHOST SHIELD (Invisible but blocks clicks to Title/Share) */
        .top-shield {
            position: absolute; 
            top: 0; left: 0; width: 100%; 
            height: 90px; /* Deep enough to cover the hidden title bar */
            z-index: 10;
            background: rgba(0,0,0,0); /* Completely transparent */
            cursor: default;
        }

        /* BOTTOM OVERLAY (Raised and Solid) */
        .video-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 85px; /* Slightly higher to ensure no gaps */
            background: linear-gradient(to top, rgba(0, 255, 110, 1) 50%, rgba(0, 255, 110, 0.7) 100%);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
