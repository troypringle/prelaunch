<!DOCTYPE html>

    <style>
        body { font-family: Karla, sans-serif !important; background: #000000; color: white; margin: 0; padding: 10px; padding-bottom: 100px; }
        .wrapper { max-width: 800px; margin: auto; text-align: center; }
        
        /* PULSING TIMER */
        #timer-wrap { 
            background: rgba(255, 0, 0, 0.05); 
            border: 1px solid rgba(255, 0, 0, 0.3); 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 25px;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .timer-text { 
            font-size: 1.4rem; 
            color: #ff3333; 
            text-transform: uppercase; 
            font-weight: 900; 
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.6);
            margin-bottom: 5px;
        }
        #countdown { font-size: 2.5rem; font-weight: 900; color: #fff; font-family: monospace; }

        /* VIDEO BOX - Clean & Subtile */
        .video-box {
            position: relative; width: 100%; padding-bottom: 56.25%; height: 0;
            border: 1px solid #00ff88; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            background: #000; overflow: hidden; margin-bottom: 20px;
        }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* THE BANNER (Now under video) */
        .top-banner-wrap { 
            box-shadow: 0 0 20px 5px rgba(0, 255, 136, 0.5); 
            border-radius: 18px; 
            margin-top: 20px;
            border: 1px solid #00ff88;
            display: inline-block;
        }
        .matrix-img-btn { width: 100%; max-width: 800px; border-radius: 15px; display: block; }

        /* TRAFFIC ADBAR - Fixed Bottom Left */
        #tab-container {
            position: fixed;
            bottom: 10px;
            left: 10px;
            z-index: 9999;
            background: #000;
            border: 1px solid #222;
            padding: 5px;
            border-radius: 5px;
        }

        h2 { font-size: 1.1rem; color: #00ff88; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>

<img src="/api/v1/t" style="display:none;" alt="" onerror="this.style.display='none'">

<script>
    // Link Guard
    (function() {
        var params = window.location.search;
        if (params) {
            document.querySelectorAll('.track-link').forEach(function(l) {
                var sep = l.href.indexOf('?') !== -1 ? '&' : '?';
                l.href = l.href + params.replace('?', sep);
            });
        }
    })();

    // 24-Hour Timer Logic
    function updateTimer() {
        const now = new Date();
        const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        const diff = tomorrow - now;

        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML = 
            (hours < 10 ? "0" + hours : hours) + ":" + 
            (minutes < 10 ? "0" + minutes : minutes) + ":" + 
            (seconds < 10 ? "0" + seconds : seconds);
    }
    setInterval(updateTimer, 1000);
    updateTimer();
</script>
