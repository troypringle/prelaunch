    <style>
        /* UNIVERSAL MATRIX SCROLLBAR */
        html {
            scrollbar-width: thin;
            scrollbar-color: #004d1a #000000;
        }
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(to bottom, #004d1a, #00ff88); 
            border-radius: 10px; 
            border: 2px solid #000;
        }

        /* BASE RESET */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Karla', sans-serif; 
            background: #000; 
            color: white; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container-main { max-width: 850px; margin: 0 auto; padding: 15px; text-align: center; position: relative; }

        /* HEADLINE */
        .headline { 
            font-size: clamp(1.4rem, 6vw, 2.8rem); 
            color: #00ff88; font-weight: 900; text-transform: uppercase; 
            margin-bottom: 25px; line-height: 1.1; 
        }
        .red-arrow { color: #ff0000; margin-right: 8px; }

        /* THE MASSIVE YELLOW STREAK */
        .streak-container {
            display: inline-block;
            background: #ffea00;
            /* Angled edges for that "design" look */
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
            padding: 15px 40px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(255, 234, 0, 0.2);
        }
        .timer-label { 
            font-size: clamp(1.3rem, 6vw, 2.2rem); 
            color: #ff0000; 
            font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: 1px;
            /* Subtle dark stroke to prevent bleed */
            text-shadow: 1px 1px 0px rgba(0,0,0,0.1);
        }

        .timer-box { 
            background: transparent; 
            border: 2px solid #00ff88; 
            border-radius: 20px; padding: 25px 15px; margin-bottom: 20px;
        }
        #countdown { font-size: clamp(3rem, 15vw, 5rem); color: #00ff88; font-family: monospace; font-weight: 900; }
        
        /* VIDEO WRAPPER */
        .video-wrapper {
            position: relative; width: 100%; padding-bottom: 56.25%;
            height: 0; border: 1.5px solid #00ff88; border-radius: 6px;
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.4); background: #000; margin-bottom: 10px;
            overflow: hidden;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* EXIT GUARDS */
        .exit-guard-top { position: absolute; top: 0; left: 0; width: 100%; height: 80px; z-index: 100; }
        .exit-guard-side { position: absolute; top: 80px; bottom: 50px; width: 25%; z-index: 100; }

        .video-cta-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; height: 55px; 
            background: linear-gradient(to top, rgba(0, 255, 110, 0.7), transparent); 
            display: flex; align-items: center; justify-content: center; z-index: 110;
        }
        .video-cta-overlay a { color: white; font-size: 20px; font-weight: bold; text-decoration: none; width: 100%; }

        /* YODA TEXT - WIDER & STANDS OUT */
        .yoda-quote {
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            color: #777;
            font-style: italic;
            margin: 20px 0 35px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* BANNER */
        .banner-img { 
            width: 100%; height: auto; border-radius: 8px; 
            box-shadow: 8px 8px 20px rgba(255, 0, 0, 0.5), -4px -4px 15px rgba(0, 255, 136, 0.3);
        }

        /* TRAFFIC ADBAR - GHOST FOOTER */

            margin-top: 80px;
            padding: 20px;
            display: flex;
            justify-content: flex-start;
            opacity: 0.7; /* Less visible as requested */
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>

<div class="container-main">

        <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1&enablejsapi=1" frameborder="0" allowfullscreen></iframe>

    <div class="yoda-quote">"do or do not there is no try" - yoda</div>

    <a href="https://troypringle2.aimatrixspillover.com/" class="banner-link">
        <img src="https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/2635024737b92bb05b71e8c4a98a9751.png" class="banner-img" alt="Secure Your Spot">
    </a>

    <div class="adbar-ghost-zone">
        <div id="tab-container">
            <script type="text/javascript">
                tc_ad_client="pringle1troy"; tc_ad_width="252"; tc_ad_height="90";
                tc_color_border="#000000"; tc_color_title="#003311"; tc_color_background="#000000"; 
                tc_color_text="#003311"; tc_color_url="#001100";

</div>

<script>
    (function() {
        var params = window.location.search;
        if (params) {
            document.querySelectorAll('a').forEach(function(link) {
                if(link.href.includes('aimatrixspillover')) {
                    var sep = link.href.indexOf('?') !== -1 ? '&' : '?';
                    link.href = link.href + params.replace('?', sep);
                }
            });
        }
    })();

    function startTimer() {
        setInterval(() => {
            const now = new Date();
            const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            const diff = tomorrow - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById("countdown").innerText = 
                `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }
    startTimer();
</script>
