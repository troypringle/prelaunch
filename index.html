<!DOCTYPE html>
<html lang="en">
<head>
    <title>OFFICIAL PRELAUNCH - AiMatrix</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://linkpod.s3.us-east-1.amazonaws.com/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Karla&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: Karla, sans-serif !important; background: #000000; color: white; margin: 0; padding: 10px; position: relative; min-height: 100vh; }
        .wrapper { max-width: 800px; margin: auto; text-align: center; padding-bottom: 120px; }
        
        /* TOP TEXT & BIG FLASHING SYMBOL */
        .main-hook { 
            font-size: 1.8rem; color: #00ff88; margin: 20px 0; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 1px; line-height: 1.2;
        }
        .live-dot { 
            height: 24px; width: 24px; background-color: #ff0000; border-radius: 50%; 
            display: inline-block; margin-left: 15px; vertical-align: middle;
            box-shadow: 0 0 15px #ff0000; animation: blink 0.8s infinite;
        }
        @keyframes blink { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.2; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }

        /* TIMER BOX WITH LOAD ZOOM */
        #timer-wrap { 
            background: rgba(0, 255, 136, 0.03); border: 1px solid #00ff88; border-radius: 12px; 
            padding: 20px; margin-bottom: 25px; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            animation: initialZoom 0.6s ease-in-out 3; /* Zooms 3 times on load */
        }
        @keyframes initialZoom {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .timer-text { font-size: 1.7rem; color: #ff0000; text-transform: uppercase; font-weight: 900; text-shadow: 0 0 10px rgba(255, 0, 0, 0.5); margin-bottom: 5px; }
        #countdown { font-size: 3rem; font-weight: 900; color: #00ff88; font-family: monospace; }

        /* VIDEO BOX - Specific Green Glow Logic */
        .video-box {
            position: relative; width: 100%; padding-bottom: 56.25%; height: 0;
            border: 1px solid #00ff88; border-radius: 8px; 
            /* Green glow on top/sides, faded at bottom */
            box-shadow: 0 -5px 15px rgba(0, 255, 136, 0.4), 10px 0 15px rgba(0, 255, 136, 0.2), -10px 0 15px rgba(0, 255, 136, 0.2);
            background: #000; overflow: hidden; margin-bottom: 10px;
        }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* HYBRID GLOW BANNER (Red Top / Green Sides & Bottom) */
        .bottom-banner-wrap { 
            border-radius: 18px; border: 1px solid #222; display: inline-block;
            box-shadow: 
                0 -8px 15px rgba(255, 0, 0, 0.5),    /* Red Hue Top */
                0 8px 15px rgba(0, 255, 136, 0.3),   /* Green Hue Bottom */
                8px 0 15px rgba(0, 255, 136, 0.2),   /* Green Side */
                -8px 0 15px rgba(0, 255, 136, 0.2);  /* Green Side */
        }
        .matrix-img-btn { width: 100%; max-width: 800px; border-radius: 15px; display: block; }

        /* TRAFFIC ADBAR - Scrollbar Shield */
        #tab-container { position: absolute; bottom: 20px; left: 10px; z-index: 10; width: 252px; height: 90px; overflow: hidden; background: transparent; }
    </style>
</head>
<body>

<div class="wrapper">

    <div id="timer-wrap">

        <div id="countdown">00:00:00</div>
    </div>

    <div class="video-box">
        <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1&enablejsapi=1" 
                frameborder="0" allowfullscreen allow="autoplay"></iframe>
        
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 75px; z-index: 20;"></div>
        <div style="position: absolute; top: 75px; bottom: 45px; left: 0; width: 25%; z-index: 20;"></div>
        <div style="position: absolute; top: 75px; bottom: 45px; right: 0; width: 25%; z-index: 20;"></div>

        <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 50px; background: linear-gradient(to top, rgba(0, 255, 110, 0.4), transparent); display: flex; align-items: center; justify-content: center; z-index: 30;">
            <a href="https://troypringle2.aimatrixspillover.com/" class="track-link" target="_blank" 
               style="color: white; font-size: 18px; font-weight: bold; text-decoration: none; text-shadow: 2px 2px 4px #000; width: 100%; text-align: center;">
                🔥 CLICK TO SECURE YOUR SPOT 🔥
            </a>
        </div>
    </div>

    <div class="bottom-banner-wrap">
        <a href="https://troypringle2.aimatrixspillover.com/" class="track-link">
            <img src="https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/2635024737b92bb05b71e8c4a98a9751.png" class="matrix-img-btn" alt="Join Now">
        </a>
    </div>
</div>

<div id="tab-container">
    <script type="text/javascript">
        tc_ad_client="pringle1troy"; tc_ad_width="252"; tc_ad_height="90";
        tc_color_border="#000000"; tc_color_title="#004d26"; tc_color_background="#000000"; 
        tc_color_text="#004d26"; tc_color_url="#002211";
    </script>
    <script type="text/javascript" src="https://trafficadbar.com/bar/show.js"></script>
</div>

<img src="/api/v1/t" style="display:none;" alt="" onerror="this.style.display='none'">

<script>
    // Link Guard
    (function() {
        var params = window.location.search;
        if (params) {
            document.querySelectorAll('.track-link').forEach(function(l) {
                var sep = l.href.indexOf('?') !== -1 ? '&' : '?';
                l.href = l.href + params.replace('?', sep);
            });
        }
    })();

    // Timer Logic
    function updateTimer() {
        const now = new Date();
        const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        const diff = tomorrow - now;
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);
        document.getElementById("countdown").innerHTML = 
            (hours < 10 ? "0" + hours : hours) + ":" + 
            (minutes < 10 ? "0" + minutes : minutes) + ":" + 
            (seconds < 10 ? "0" + seconds : seconds);
    }
    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>
