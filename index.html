        /* THE CLIP-PATH FIX: The ultimate scrollbar killer */
        .ad-container {
            display: inline-block;
            vertical-align: top;
            margin: 15px 5px;

            height: 90px;

            filter: sepia(1) hue-rotate(90deg) brightness(0.4) contrast(1.2);
