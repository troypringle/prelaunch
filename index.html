<!DOCTYPE html>
<html lang="en">
<head>
    <title>Official PRELAUNCH By Joel Therien My Sponsors Downline</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link href="https://linkpod.s3.us-east-1.amazonaws.com/assets/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* BASE RESET */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Karla', sans-serif; 
            background: #000; 
            color: white; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container-main { max-width: 800px; margin: 0 auto; padding: 15px; text-align: center; position: relative; }

        /* HEADLINE */
        .headline { 
            font-size: clamp(1.3rem, 5vw, 2.5rem); 
            color: #00ff88; font-weight: 900; text-transform: uppercase; 
            margin: 19px 0; line-height: 1.1; 
        }
        .red-arrow { color: #ff0000; margin-right: 8px; }
        .live-dot { 
            height: 24px; width: 24px; background: #ff0000; border-radius: 50%; 
            display: inline-block; margin-left: 13px; vertical-align: middle;
            box-shadow: 0 0 13px #ff0000; animation: blink 0.6s infinite;
        }

        /* TIMER BOX & STREAK */
        .timer-box { 
            background: rgba(0, 0, 0, 0.4); border: 1.5px solid #00ff88; 
            border-radius: 15px; padding: 15px; margin-bottom: 5px;
            animation: loadZoom 0.9s ease-in-out 6;
        }
        
        /* THE YELLOW STREAK DESIGN */
        .streak-container {
            display: inline-block;
            background: linear-gradient(110deg, transparent 10%, #ffea00 15%, #ffea00 85%, transparent 90%);
            padding: 2px 20px;
            border-bottom: 4px solid #ff0000; /* The Red Underline */
            margin-bottom: 10px;
        }
        .timer-label { 
            font-size: clamp(1rem, 4.5vw, 1.5rem); 
            color: #000; /* Black text on yellow background */
            font-weight: 900; 
            text-transform: uppercase;
        }

        #countdown { font-size: clamp(2.5rem, 12vw, 4rem); color: #00ff88; font-family: monospace; font-weight: 900; }
        
        /* YODA TEXT - Increased Size */
        .yoda-quote {
            font-size: 1.1rem;
            color: #bbb;
            font-style: italic;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        /* VIDEO WRAPPER - Restoration of Guards & Glow */
        .video-wrapper {
            position: relative; width: 100%; padding-bottom: 56.25%;
            height: 0; border: 1px solid #00ff88; border-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); background: #000; margin-bottom: 19px;
            overflow: hidden;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 4px; }

        /* EXIT GUARDS - Blocks YouTube UI */
        .exit-guard-top { position: absolute; top: 0; left: 0; width: 100%; height: 75px; z-index: 100; cursor: default; }
        .exit-guard-side { position: absolute; top: 75px; bottom: 50px; width: 25%; z-index: 100; cursor: default; }

        .video-cta-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; height: 50px; 
            background: linear-gradient(to top, rgba(0, 255, 110, 0.6), transparent); 
            display: flex; align-items: center; justify-content: center; z-index: 110;
            backdrop-filter: blur(2px);
        }
        .video-cta-overlay a {
            color: white; font-size: clamp(14px, 4vw, 18px); font-weight: bold; 
            text-decoration: none; text-shadow: 2px 2px 4px #000; width: 100%;
        }

        /* BANNER */
        .banner-link { display: block; text-decoration: none; margin-top: 10px; }
        .banner-img { 
            width: 100%; height: auto; border-radius: 4px; 
            box-shadow: 6px 6px 15px rgba(255, 0, 0, 0.5), -2px -2px 10px rgba(0, 255, 136, 0.3);
        }

        /* TRAFFIC ADBAR - Fixed Bottom Left */
        .adbar-footer { 
            position: fixed; bottom: 5px; left: 5px; z-index: 200;
            width: 260px; pointer-events: auto;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes loadZoom { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    </style>
</head>
<body>

<div class="container-main">
    <h1 class="headline"><span class="red-arrow">➤</span>How Eric Built a Massive Downline <span class="live-dot"></span></h1>

    <div class="timer-box">

        </div>
        <div id="countdown">00:00:00</div>
    </div>
    
    <div class="yoda-quote">"do or do not there is no try" - yoda</div>

    <div class="video-wrapper">
        <div class="exit-guard-top"></div>
        <div class="exit-guard-side" style="left:0;"></div>
        <div class="exit-guard-side" style="right:0;"></div>

        <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1&enablejsapi=1" 
                frameborder="0" allowfullscreen></iframe>
        
        <div class="video-cta-overlay">
            <a href="https://troypringle2.aimatrixspillover.com/" class="track-link" target="_blank">
                🔥 CLICK TO SECURE YOUR SPOT 🔥
            </a>
        </div>
    </div>

    <a href="https://troypringle2.aimatrixspillover.com/" class="banner-link">
        <img src="https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/2635024737b92bb05b71e8c4a98a9751.png" 
             class="banner-img" alt="Secure Your Spot">
    </a>
</div>

<div class="adbar-footer">
    <div id="tab-container">
        <script type="text/javascript">
            tc_ad_client="pringle1troy"; tc_ad_width="252"; tc_ad_height="90";
            tc_color_border="#000000"; tc_color_title="#00ff88"; tc_color_background="#000000"; 
            tc_color_text="#00ff88"; tc_color_url="#00ff88";
        </script>
        <script type="text/javascript" src="https://trafficadbar.com/bar/show.js"></script>
    </div>
</div>

<script>
    (function() {
        var params = window.location.search;
        if (params) {
            document.querySelectorAll('a').forEach(function(link) {
                if(link.href.includes('aimatrixspillover')) {
                    var sep = link.href.indexOf('?') !== -1 ? '&' : '?';
                    link.href = link.href + params.replace('?', sep);
                }
            });
        }
    })();

    function startTimer() {
        setInterval(() => {
            const now = new Date();
            const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            const diff = tomorrow - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById("countdown").innerText = 
                `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }
    startTimer();
</script>
