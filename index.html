    <style>
        body { font-family: Karla, sans-serif !important; background: #000000; color: white; margin: 0; padding: 15px; }
        .wrapper { max-width: 850px; margin: auto; text-align: center; }
        
        .top-banner-wrap { box-shadow: 0 0 20px 5px rgba(255, 0, 200, 0.9); border-radius: 18px; display: inline-block; width: 100%; margin-bottom: 20px; }
        .matrix-img-btn { width: 100%; max-width: 850px; border-radius: 15px; display: block; margin: 0 auto; }
        
        .video-box {
            position: relative; width: 100%; padding-bottom: 56.25%; height: 0;
            border: 2px solid #00ff88; border-radius: 6px; box-shadow: 0 0 15px #00ff88;
            background: #000; overflow: hidden; margin-bottom: 30px;
        }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* THE SCROLLBAR COVER-UP */
        .ad-zone {
            margin: 30px auto;
            width: 490px;
            height: 90px;
            position: relative; /* Essential for the overlay to stick */
            filter: sepia(1) hue-rotate(90deg) brightness(0.4) contrast(1.2);
            overflow: hidden;
        }

        /* This creates the "Frame" that hides the scrollbars */
        .ad-zone::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            /* Creates a 6px black border INSIDE the box to cover the bars */
            box-shadow: inset 0 0 0 6px #000000; 
            pointer-events: none; /* Allows clicks to pass through to the ad */
            z-index: 10;
        }

        .sponsor-box { margin-top: 40px; padding: 30px; border-top: 1px solid #222; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #00ff88; margin-bottom: 10px; }

        @media (max-width: 520px) {
            .ad-zone { width: 100%; height: auto; }
            .ad-zone::after { display: none; } /* Disable frame on mobile if it interferes */
        }
    </style>
</head>
