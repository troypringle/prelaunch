<!DOCTYPE html>
<html lang="en">
<head>
    <title>Official PRELAUNCH By Joel Therien My Sponsors Downline</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <style>
        * { box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            margin: 0; padding: 10px;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            overflow-x: hidden; /* Stops horizontal "wiggle" */
        }

        /* OUTER PAGE BORDER - Stabilized to 100% */
        .page-border {
            width: 100%;
            max-width: 820px;
            border: 1px solid #1a1a1a; 
            border-radius: 13px;
            padding: 12px;
            background: #020202; 
            text-align: center;
        }

        /* SETTING: YELLOW TOP BANNER (Locked to Container Width) */
        .streak-container {
            display: inline-block;
            width: 100%;
            max-width: 820px; 
            height: 99px;      
            background: url('https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/f3511efd5936e0986b6fb7034cecc2c7.png') center / 100% 100% no-repeat;
            position: relative;
            margin-bottom: 11px;
        }
        .streak-text {
            font-size: 29px; 
            color: #ff0000;
            font-weight: 900;
            text-transform: uppercase;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            margin: 0;
        }

        .banner-img {
            width: 100%;
            max-width: 778px;
            height: auto;
            border-radius: 6px;
            display: block;
            margin: 0 auto;
        }

        .spacer-between {
            height: 25px; 
        }

        /* SETTING: WATCH HOW TEXT */
        .headline {
            font-size: 29px; 
            color: #00ff88;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 21px;
            display: block;
        }
        .red-arrow { color: #ff0000; margin-right: 6px; }

        /* VIDEO AREA */
        .video-container-box {
            position: relative;
            width: 98%;
            max-width: 780px;
            margin: 0 auto 10px auto;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            border: 1.1px solid #00ff88;
            background: #000;
            overflow: hidden;
            border-radius: 3px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* EXIT BLOCKER (33% Top) */
        .touch-shield {
            position: absolute;
            top: 0; left: 0; right: 0; 
            height: 33%; 
            z-index: 10;
            background: rgba(0,0,0,0);
        }

        /* RED GLASS CTA (36% Visible) */
        .video-cta-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 55px;
            background: rgba(180, 0, 0, 0.36); 
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-top: 1px solid rgba(255, 0, 0, 0.2);
        }

        /* SETTING: YELLOW CTA TEXT */
        .video-cta-overlay a {
            color: #ffff00; /* FIXED: Now Yellow Text */
            font-size: 18px;
            font-weight: 900;
            text-decoration: none;
            width: 100%;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
        }

        /* SETTING: YODA QUOTE (LARGER / LIGHT GRAY) */
        .yoda-quote {
            font-size: 16px; /* FIXED: Larger */
            color: #888;    /* FIXED: Lighter Gray for visibility */
            margin-top: 20px;
            text-transform: uppercase;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="page-border">
    <div class="streak-container">
        <p class="streak-text">Time Sensitive New Updates</p>
    </div>

    <a href="https://troypringle2.aimatrixspillover.com/">
        <img src="https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/2635024737b92bb05b71e8c4a98a9751.png"
             class="banner-img" alt="Secure Your Spot">
    </a>

    <div class="spacer-between"></div>

    <span class="headline">
        <span class="red-arrow">➤</span> Watch How Eric Builds a Massive Downline
    </span>

    <div class="video-container-box">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1"
                    frameborder="0" allowfullscreen></iframe>
        </div>
        
        <div class="touch-shield"></div>

        <div class="video-cta-overlay">
            <a href="https://troypringle2.aimatrixspillover.com/" target="_blank">🔥 CLICK TO SECURE YOUR SPOT 🔥</a>
        </div>
    </div>

    <div class="yoda-quote">"do or do not there is no try" - yoda</div> 
</div>

<script>
    (function() {
        var params = window.location.search;
        if (params) {
            var links = document.getElementsByTagName('a');
            for (var i = 0; i < links.length; i++) {
                if(links[i].href.indexOf('aimatrixspillover') !== -1) {
                    var sep = links[i].href.indexOf('?') !== -1 ? '&' : '?';
                    links[i].href += sep + params.substring(1);
                }
            }
        }
    })();
</script>

</body>
</html>
