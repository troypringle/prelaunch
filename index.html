        .main-btn {

            padding: 20px; border-radius: 12px; margin: 20px 0; text-decoration: none;

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(0, 255, 136, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } }

<script>
    (function() {
        var query = window.location.search;
        if (query) {
            // Update the main button
            var btn = document.getElementById('dynamic-link');
            var sep1 = btn.href.indexOf('?') !== -1 ? '&' : '?';
            btn.href = btn.href + query.replace('?', sep1);
