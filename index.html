        * { box-sizing: border-box; }

        .page-border {

        }
        .streak-text {
            font-size: 29px; 
            color: #ff0000;
            font-weight: 900;
            text-transform: uppercase;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 93%;

        }

        .banner-img-container {

        .banner-img {

        .spacer-between { height: 25px; }

        .headline {

            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 21px;

        }
        .red-arrow { color: #ff0000; margin-right: 6px; }

        .video-container-box {
            position: relative;
            width: 98%;
            max-width: 780px;
            margin: 0 auto 10px auto;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            border: 1.5px solid #004d26; 
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); 
            background: #000;
            overflow: hidden;
            border-radius: 4px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .touch-shield {
            position: absolute;
            top: 0; left: 0; right: 0; 
            height: 38%; 
            z-index: 10;
        }

        .video-cta-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 53px;
            background: rgba(0, 30, 15, 0.3);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-top: 1px solid rgba(0, 77, 38, 0.4);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.1), inset 0 -1px 2px rgba(0, 0, 0, 0.5);
        }

        .video-cta-overlay a {
            color: #ffffff;
            font-size: 19px;
            font-weight: 900;
            text-decoration: none;
            width: 99%;
            text-shadow: 2px 2px 4px #000000;
        }

        .yoda-quote {
            font-size: 16px; 
            color: #888;    
            margin-top: 20px;
            text-transform: uppercase;
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 600px) {
            .streak-text { font-size: 22px; } 
            .headline { font-size: 22px; }   
            .streak-container { height: 75px; }
            .spacer-between { height: 15px; }
            .video-cta-overlay a { font-size: 16px; }

        /* ==================================================== */
        /* 2. GHOST SECTION START - YOU CAN SAFELY REMOVE THIS  */
        /* ==================================================== */
        @keyframes extremeGhostDrift {
            0% { transform: translate(5vw, 5vh) scale(1) rotate(0deg); }
            10% { transform: translate(90vw, 15vh) scale(0.8) rotate(15deg); }
            12% { transform: translate(92vw, 17vh) scale(0.8) rotate(15deg); }
            25% { transform: translate(50vw, 90vh) scale(1.2) rotate(-10deg); }
            40% { transform: translate(-10vw, 50vh) scale(0.7) rotate(-30deg); }
            55% { transform: translate(105vw, 105vh) scale(1.3) rotate(45deg); }
            70% { transform: translate(20vw, 30vh) scale(0.9) rotate(5deg); }
            85% { transform: translate(80vw, 5vh) scale(1) rotate(0deg); }
            100% { transform: translate(5vw, 5vh) scale(1) rotate(0deg); }
        }

        .ghost-container {
            position: fixed;
            top: 0; left: 0;
            width: 150px; height: 150px;
            z-index: 10000; /* Stays above everything */
            opacity: 0.45;
            pointer-events: none; /* CLICK-THROUGH ACTIVE */
            mix-blend-mode: screen;
            filter: drop-shadow(0 0 15px rgba(255, 0, 150, 0.9)) 
                    drop-shadow(0 0 30px rgba(255, 0, 150, 0.6));
            animation: extremeGhostDrift 16s linear infinite; 
        }

        .ghost-svg { width: 100%; height: 100%; fill: #ffffff; }
        /* GHOST SECTION END                                    */
        /* ==================================================== */
    </style>
</head>
