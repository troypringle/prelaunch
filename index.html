    <style>
        /* FORCED DARK GREEN SCROLLBAR */
        :root { scrollbar-color: #002200 #000; scrollbar-width: thin; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #002200; border-radius: 2px; }

        /* BASE RESET */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Karla', sans-serif; 
            background: #000;

            margin: 0;

            overflow-x: hidden;

        /* Responsive Container - wider on desktop */

            display: inline-block;
            background: #ffea00;
            position: relative;
            padding: 15px 50px;
            margin-bottom: 15px;
            /* Creating the jagged/painted edge look */
            clip-path: polygon(
                2% 15%, 15% 5%, 35% 12%, 65% 2%, 85% 10%, 98% 5%, 
                100% 45%, 95% 85%, 75% 95%, 45% 88%, 20% 98%, 0% 80%
            );
        }
        .timer-label {

            color: #ff0000; font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: -1px; /* Tighter marketing look */
        }

        /* TIMER BOX - Clean & Responsive */
        .timer-box { 
            background: transparent; 
            border: 1px solid #1a1a1a; 
            max-width: 550px; 
            margin: 0 auto 25px auto;
            padding: 20px;
        }
        #countdown { 
            font-size: clamp(3rem, 15vw, 5.5rem); 
            color: #00ff88; font-family: monospace; font-weight: 900; 
            line-height: 1;
        }
        
        /* VIDEO WRAPPER */
        .video-wrapper {
            position: relative; width: 100%; padding-bottom: 56.25%;
            height: 0; border: 1.5px solid #00ff88; border-radius: 4px;
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.3); background: #000; margin-bottom: 15px;
            overflow: hidden;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .video-cta-overlay {

            display: flex; align-items: center; justify-content: center; z-index: 110;

        /* YODA TEXT */

            color: #666;
            font-style: italic;
            margin: 20px 0 30px 0;
            letter-spacing: 2px;
            text-transform: uppercase;

        /* BANNER */

        }

        /* TRAFFIC ADBAR */

        /* Mobile specific tweaks */
        @media (max-width: 600px) {

<script>
    (function() {
        var params = window.location.search;
        if (params) {
            document.querySelectorAll('a').forEach(function(link) {
                if(link.href.includes('aimatrixspillover')) {
                    var sep = link.href.indexOf('?') !== -1 ? '&' : '?';
                    link.href = link.href + params.replace('?', sep);
                }
            });
        }
    })();

    function startTimer() {
        setInterval(() => {
            const now = new Date();
            const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            const diff = tomorrow - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById("countdown").innerText = 
                `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }
    startTimer();
</script>
