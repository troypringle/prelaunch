<!DOCTYPE html>
<html lang="en">
<head>
    <title>Official PRELAUNCH By Joel Therien My Sponsors Downline</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <style>
        * { box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            margin: 0; padding: 10px;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .page-border {
            width: 100%;
            max-width: 820px;
            border: 1px solid #1a1a1a; 
            border-radius: 13px;
            padding: 12px;
            background: #020202; 
            text-align: center;
        }

        /* TOP RED BANNER (CLEAN) */
        .streak-container {
            display: inline-block;
            width: 100%;
            max-width: 820px; 
            height: 90px;      
            background: url('https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/f3511efd5936e0986b6fb7034cecc2c7.png') center / 100% 100% no-repeat;
            position: relative;
            margin-bottom: 11px;
            border: none;
            box-shadow: none;
            border-radius: 4px;
        }
        .streak-text {
            font-size: 29px; 
            color: #ff0000;
            font-weight: 900;
            text-transform: uppercase;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            margin: 0;
        }

        /* ---------------------------------------------------- */
        /* SETTING: MAIN BANNER (MINT GLOW INCREASED BY 0.3)      */
        /* ---------------------------------------------------- */
        .banner-img-container {
            display: block;
            margin: 0 auto;
            max-width: 778px;
            border: 1px solid rgba(144, 238, 144, 0.2); 
            /* Glow opacity increased from 0.15 to 0.45 (+0.3) */
            box-shadow: 0 0 15px rgba(144, 238, 144, 0.45); 
            border-radius: 6px;
            overflow: hidden; 
        }
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .spacer-between {
            height: 25px; 
        }

        /* ---------------------------------------------------- */
        /* SETTING: WATCH HOW TEXT (CHANGED FROM GREEN TO WHITE) */
        /* ---------------------------------------------------- */
        .headline {
            font-size: 29px; 
            color: #ffffff; /* FIXED: Now White */
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 21px;
            display: block;
        }
        .red-arrow { color: #ff0000; margin-right: 6px; }

        /* VIDEO AREA & GLOWS */
        .video-container-box {
            position: relative;
            width: 98%;
            max-width: 780px;
            margin: 0 auto 10px auto;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            /* ---------------------------------------------------- */
            /* SETTING: DARK GREEN VIDEO BORDER & INCREASED GLOW      */
            /* ---------------------------------------------------- */
            border: 1.5px solid #004d26; /* FIXED: Dark Green Border */
            /* Glow opacity increased from 0.2 to 0.5 (+0.3) */
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); 
            background: #000;
            overflow: hidden;
            border-radius: 4px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* 38% EXIT SHIELD */
        .touch-shield {
            position: absolute;
            top: 0; left: 0; right: 0; 
            height: 38%; 
            z-index: 10;
            background: rgba(0,0,0,0);
        }

        /* DARK GREEN EMBOSSED CTA OVERLAY */
        .video-cta-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 53px;
            background: rgba(0, 30, 15, 0.3); /* DARK GREEN TRANSPARENT */
            backdrop-filter: blur(8px); /* INCREASED BLUR */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-top: 1px solid rgba(0, 77, 38, 0.4);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.1), inset 0 -1px 2px rgba(0, 0, 0, 0.5); /* EMBOSSED EFFECT */
        }

        /* CTA TEXT - BRIGHTER, BIGGER, WHITE WITH BLACK SHADOW */
        .video-cta-overlay a {
            color: #ffffff; /* FIXED: Now White */
            font-size: 19px; /* FIXED: Increased size */
            font-weight: 900;
            text-decoration: none;
            width: 99%;
            text-shadow: 2px 2px 4px #000000; /* FIXED: Added strong black shadow */
        }

        .yoda-quote {
            font-size: 16px; 
            color: #888;    
            margin-top: 20px;
            text-transform: uppercase;
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 600px) {
            .streak-text { font-size: 22px; } 
            .headline { font-size: 22px; }   
            .streak-container { height: 75px; }
            .spacer-between { height: 15px; }
            .video-cta-overlay a { font-size: 16px; } /* Adjust mobile size too */
        }
    </style>
</head>
<body>

<div class="page-border">
    <div class="streak-container">
        <p class="streak-text">Time Sensitive New Updates</p>
    </div>

    <a href="https://troypringle2.aimatrixspillover.com/" class="banner-img-container">
        <img src="https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/2635024737b92bb05b71e8c4a98a9751.png"
             class="banner-img" alt="Secure Your Spot">
    </a>

    <div class="spacer-between"></div>

    <span class="headline">
        <span class="red-arrow">➤</span> Watch How Eric Builds a Massive Downline
    </span>

    <div class="video-container-box">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1"
                    frameborder="0" allowfullscreen></iframe>
        </div>
        
        <div class="touch-shield"></div>

        <div class="video-cta-overlay">
            <a href="https://troypringle2.aimatrixspillover.com/" target="_blank"> CLICK TO SECURE YOUR SPOT ✔️</a>
        </div>
    </div>

    <div class="yoda-quote">"do or do not there is no try" - yoda</div> 
</div>

<script>
    (function() {
        var params = window.location.search;
        if (params) {
            var links = document.getElementsByTagName('a');
            for (var i = 0; i < links.length; i++) {
                if(links[i].href.indexOf('aimatrixspillover') !== -1) {
                    var sep = links[i].href.indexOf('?') !== -1 ? '&' : '?';
                    links[i].href += sep + params.substring(1);
                }
            }
        }
    })();
</script>

</body>
</html>
