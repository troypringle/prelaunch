<!DOCTYPE html>
<html lang="en">
<head>
    <title>Official PRELAUNCH By Joel Therien My Sponsors Downline</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <!-- Reliable Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* GLOBAL SCROLLBAR */
        html {
            scrollbar-color: #001a00 #000;
            scrollbar-width: thin;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #001a00; border: 1px solid #003300; }

        * { box-sizing: border-box; }

        body {
            font-family: 'Karla', sans-serif;
            background: #000;
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .container-main {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 15px;
            text-align: center;
        }

        /* HEADLINE - Green glow WAY DOWN */
        .headline {
            font-size: clamp(1.45rem, 6.5vw, 2.7rem);
            color: #00ff88;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 12px;
            line-height: 1.05;
            text-shadow:
                0 0 6px #00ff88,
                0 0 10px rgba(0, 255, 136, 0.35);
        }

        .red-arrow {
            color: #ff0000;
        }

        /* MLM PRELAUNCH - Red glow reduced */
        .mlm-prelaunch {
            font-size: clamp(1rem, 4vw, 1.45rem);
            color: #ff0000;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 25px;
            text-shadow:
                0 0 4px #ff0000,
                0 0 8px rgba(255, 0, 0, 0.3);
        }

        /* YELLOW BRUSH STREAK - Using your NEW smaller image */
        .streak-container {
            display: inline-block;
            width: 100%;
            max-width: 760px;
            height: 135px;           /* Adjusted for the smaller image while keeping full coverage */
            background: url('https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/f3511efd5936e0986b6fb7034cecc2c7.png') 
                        center / contain no-repeat;
            position: relative;
            margin-bottom: 30px;
            border-radius: 6px;
            overflow: hidden;
        }

        .timer-label {
            font-size: clamp(1.35rem, 6vw, 2.25rem);
            color: #ff0000;
            font-weight: 900;
            text-transform: uppercase;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            margin: 0;
            padding: 0 20px;
            line-height: 1.1;
            /* Red glow WAY DOWN */
            text-shadow:
                0 0 4px #ff3333,
                0 0 8px rgba(255, 50, 50, 0.35);
        }

        /* VIDEO WRAPPER - Lazy load (fixes mobile spinner) */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            border: 1.5px solid #00ff88;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            background: #000;
            margin-bottom: 25px;
            overflow: hidden;
            cursor: pointer;
        }

        .video-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .video-wrapper .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(255,0,0,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 0 15px rgba(255,0,0,0.6);
        }

        .video-wrapper .play-button span {
            color: white;
            font-size: 40px;
            margin-left: 8px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        /* CLICK TO SECURE OVERLAY */
        .video-cta-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 55px;
            background: linear-gradient(to top, rgba(0, 255, 110, 0.7), transparent);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 110;
        }

        .video-cta-overlay a {
            color: #ff0000;
            font-size: 19px;
            font-weight: bold;
            text-decoration: none;
            width: 100%;
            text-shadow:
                0 0 6px #ff0000,
                0 0 12px rgba(255, 0, 0, 0.5);
        }

        /* YODA TEXT */
        .yoda-quote {
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            color: #555;
            font-style: italic;
            margin: 15px 0 30px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* BANNER */
        .banner-img {
            width: 100%;
            max-width: 800px;
            height: auto;
            border-radius: 4px;
            margin-bottom: 30px;
        }

        /* TRAFFIC ADBAR */
        .adbar-footer {
            padding: 25px 0 15px;
            display: flex;
            justify-content: center;
            background: #000;
        }
        #tab-container, #tab-container > div, .adbar-footer * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #tab-container::-webkit-scrollbar,
        #tab-container > div::-webkit-scrollbar,
        .adbar-footer *::-webkit-scrollbar {
            display: none;
        }
        #tab-container {
            max-width: 280px;
            background: #000;
            border: 1px solid #222;
        }
    </style>
</head>
<body>
<div class="container-main">
    <h1 class="headline"><span class="red-arrow">➤</span> Watch How Eric Builds a Massive Downline</h1>
   
    <!-- MLM Prelaunch Subheadline -->
    <div class="mlm-prelaunch">MLM PRELAUNCH</div>

    <!-- NEW Smaller Yellow Brush (transparent + fully behind red text) -->
    <div class="streak-container">
        <div class="timer-label">Time Sensitive New Updates</div>
    </div>
 
    <!-- Lazy-loading YouTube (no more mobile loading wheel) -->
    <div class="video-wrapper" onclick="loadYouTubeVideo(this)">
        <img src="https://img.youtube.com/vi/S-T07JIxQEk/maxresdefault.jpg" 
             alt="Video Thumbnail">

        <div class="play-button">
            <span>▶</span>
        </div>

        <iframe id="youtube-iframe" 
                frameborder="0" 
                allowfullscreen></iframe>

        <div class="video-cta-overlay">
            <a href="https://troypringle2.aimatrixspillover.com/" target="_blank">🔥 CLICK TO SECURE YOUR SPOT 🔥</a>
        </div>
    </div>

    <div class="yoda-quote">"do or do not there is no try" - yoda</div>
  
    <a href="https://troypringle2.aimatrixspillover.com/">
        <img src="https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/2635024737b92bb05b71e8c4a98a9751.png"
             class="banner-img" alt="Secure Your Spot">
    </a>

    <!-- TRAFFIC ADBAR -->
    <div class="adbar-footer">
        <div id="tab-container">
            <script type="text/javascript">
                tc_ad_client="pringle1troy";
                tc_ad_width="252";
                tc_ad_height="120";
                tc_color_border="#222222";
                tc_color_title="#00cc66";
                tc_color_background="#111111";
                tc_color_text="#00cc66";
                tc_color_url="#00aa44";
            </script>
            <script type="text/javascript" src="https://trafficadbar.com/bar/show.js"></script>
        </div>
    </div>
</div>

<!-- JavaScript for lazy YouTube -->
<script>
function loadYouTubeVideo(wrapper) {
    const iframe = wrapper.querySelector('#youtube-iframe');
    iframe.src = "https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1&autoplay=1";
    iframe.style.display = 'block';

    wrapper.querySelector('img').style.display = 'none';
    wrapper.querySelector('.play-button').style.display = 'none';
    wrapper.onclick = null;
}
</script>
</body>
</html>
