<!DOCTYPE html>
<html lang="en">
<head>
    <title>Official PRELAUNCH By Joel Therien My Sponsors Downline</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Karla', sans-serif;
            background: #000;
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        /* Container & Spacing - Tighter for Mobile */
        .container-main {
            max-width: 820px;
            margin: 0 auto;
            padding: 5px 12px 30px 12px;
            text-align: center;
        }
        
        .banner-img {
            width: 100%;
            max-width: 800px;
            height: auto;
            border-radius: 4px;
            margin-bottom: 12px; /* Reduced */
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* Yellow Streak - Responsive Height */
        .streak-container {
            display: inline-block;
            width: 100%;
            max-width: 830px;
            height: clamp(60px, 12vw, 110px); /* Smaller on mobile */
            background: url('https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/f3511efd5936e0986b6fb7034cecc2c7.png') center / cover no-repeat;
            position: relative;
            margin-bottom: 8px; /* Tighter */
            border-radius: 3px;
        }
        .streak-text {
            font-size: clamp(1.1rem, 5vw, 2.1rem); /* Sized down */
            color: #ff0000;
            font-weight: 900;
            text-transform: uppercase;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-shadow: 0 0 3px #ff3333;
        }

        /* Sub-Headline - Way Smaller per request */
        .headline {
            font-size: clamp(0.95rem, 4.2vw, 1.6rem); 
            color: #00ff88;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
            line-height: 1.2;
        }
        .red-arrow { color: #ff0000; margin-right: 4px; }

        /* VIDEO AREA - The Fix */
        .video-container-box {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            border: 1px solid #00ff88;
            border-radius: 4px;
            background: #000;
            overflow: hidden;
            z-index: 1;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* INVISIBLE SHIELD: Blocks clicks to YouTube UI */
        .touch-shield {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 50px; /* Leaves room for bottom play bar only */
            z-index: 10;
            background: rgba(0,0,0,0.01); 
        }

        /* SECURE SPOT - Sized down & mobile optimized */
        .video-cta-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: clamp(45px, 8vw, 60px); 
            background: linear-gradient(to top, rgba(0, 255, 110, 0.85), rgba(0,0,0,0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20; /* Above everything */
        }
        .video-cta-overlay a {
            color: #ff0000;
            font-size: clamp(14px, 4.5vw, 19px);
            font-weight: 900;
            text-decoration: none;
            width: 100%;
            text-shadow: 0 0 4px #ff0000;
        }

        .yoda-quote {
            font-size: clamp(0.6rem, 2.8vw, 1.1rem);
            color: #444;
            margin-top: 15px;
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container-main">
    <a href="https://troypringle2.aimatrixspillover.com/">
        <img src="https://linkpod.s3.us-east-1.amazonaws.com/uploads/block_images/2635024737b92bb05b71e8c4a98a9751.png"
             class="banner-img" alt="Secure Your Spot">
    </a>

    <div class="streak-container">
        <div class="streak-text">Time Sensitive New Updates</div>
    </div>

    <h1 class="headline">
        <span class="red-arrow">➤</span> Watch How Eric Builds a Massive Downline
    </h1>

    <div class="video-container-box">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/S-T07JIxQEk?rel=0&modestbranding=1&controls=1&showinfo=0&iv_load_policy=3&playsinline=1&enablejsapi=1"
                    frameborder="0" allowfullscreen></iframe>
        </div>
        
        <div class="touch-shield"></div>

        <div class="video-cta-overlay">
            <a href="https://troypringle2.aimatrixspillover.com/" target="_blank">🔥 CLICK TO SECURE YOUR SPOT 🔥</a>
        </div>
    </div>

    <div class="yoda-quote">"do or do not there is no try" - yoda</div>
</div>

<script>
    // URL Parameter Passing Script
    (function() {
        var params = window.location.search;
        if (params) {
            document.querySelectorAll('a').forEach(function(link) {
                if(link.href.includes('aimatrixspillover')) {
                    var sep = link.href.indexOf('?') !== -1 ? '&' : '?';
                    link.href = link.href + params.replace('?', sep);
                }
            });
        }
    })();
</script>

</body>
</html>
