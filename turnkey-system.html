<script>
    // 1. URL PARAMETER LOGIC (Existing)
    (function() {
        var params = window.location.search;
        if (params) {
            var links = document.getElementsByTagName('a');
            for (var i = 0; i < links.length; i++) {
                if(links[i].href.indexOf('aimatrixspillover') !== -1) {
                    var sep = links[i].href.indexOf('?') !== -1 ? '&' : '?';
                    links[i].href += sep + params.substring(1);
                }
            }
        }
    })();

    // 2. IMAGE ROTATION + TRANSITION BOOST
    (function() {
        const profBox = document.getElementById('profBox');
        let count = 1;
        
        setInterval(() => {
            count = (count % 7) + 1;
            
            // Apply a quick scale effect to "boost" the transition
            profBox.style.transform += " scale(1.15)";
            
            setTimeout(() => {
                profBox.style.backgroundImage = `var(--prof-${count})`;
                // Reset scale after the image swaps
                profBox.style.transform = profBox.style.transform.replace(" scale(1.15)", "");
            }, 150); 

        }, 10000); 
    })();
</script>
<script>
document.addEventListener("click", function(e) {
    const link = e.target.closest('a');
    
    // Check if the link goes to HBA
    if (link && link.href.includes('thehba.app')) {
        const urlParams = new URLSearchParams(window.location.search);
        const tidValue = urlParams.get('TID');

        if (tidValue) {
            // Stop the normal click for a split second
            e.preventDefault();

            // Re-build the URL manually to ensure it's "Hard-Coded"
            let targetURL = new URL(link.href);
            targetURL.searchParams.set('TID', tidValue);

            // Force the browser to jump to the new URL immediately
            window.location.href = targetURL.href;
        }
    }
}, true); // The 'true' ensures we catch the click before other scripts can stop it
